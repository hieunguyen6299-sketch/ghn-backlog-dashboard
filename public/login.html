<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - GHN Backlog Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --ghn-orange: #F26222;
            --bg-dark: #0f111a;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(242, 98, 34, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(242, 98, 34, 0.08), transparent 25%);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .login-container {
            background: rgba(20, 24, 36, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(242, 98, 34, 0.2);
            border-top: 3px solid var(--ghn-orange);
            border-radius: 16px;
            padding: 40px 40px 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(242, 98, 34, 0.1);
        }
        .logo-container {
            margin-bottom: 24px;
        }
        .logo-img {
            height: 48px;
            width: auto;
            object-fit: contain;
        }
        .login-title {
            color: var(--text-light);
            font-size: 1.6rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }
        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .g_id_signin {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <!-- GHN Logo -->
            <img src="https://donhang.ghn.vn/static/media/ghn-logo.6517a6a7.png" alt="GHN Logo" class="logo-img" onerror="this.src='https://cdn.haitrieu.com/wp-content/uploads/2022/05/Logo-GHN-Slogan-En.png'">
        </div>
        <h1 class="login-title">Hệ thống Nội bộ KTC</h1>
        <p class="login-subtitle">Vui lòng đăng nhập bằng tài khoản @ghn.vn</p>
        
        <div id="error-msg" class="error-message"></div>

        <div id="g_id_onload"
            data-client_id="GOOGLE_CLIENT_ID_PLACEHOLDER"
            data-context="signin"
            data-ux_mode="popup"
            data-callback="handleCredentialResponse"
            data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
            data-type="standard"
            data-shape="rectangular"
            data-theme="filled_black"
            data-text="signin_with"
            data-size="large"
            data-logo_alignment="left">
        </div>
    </div>

    <script>
        fetch('/api/config/google-client-id')
            .then(res => res.json())
            .then(data => {
                if(data.clientId) {
                    const el = document.getElementById('g_id_onload');
                    el.setAttribute('data-client_id', data.clientId);
                    google.accounts.id.initialize({
                        client_id: data.clientId,
                        callback: handleCredentialResponse
                    });
                    google.accounts.id.renderButton(
                        document.querySelector('.g_id_signin'),
                        { theme: 'filled_black', size: 'large', text: 'signin_with' }
                    );
                }
            })
            .catch(err => console.error('Failed to load client ID', err));

        function handleCredentialResponse(response) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = 'none';

            fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
            .then(res => res.json().then(data => ({ status: res.status, body: data })))
            .then(result => {
                if (result.status === 200 && result.body.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = result.body.error || 'Đăng nhập thất bại';
                    errorDiv.style.display = 'block';
                }
            })
            .catch(err => {
                errorDiv.textContent = 'Lỗi kết nối máy chủ';
                errorDiv.style.display = 'block';
            });
        }
    </script>
</body>
</html>
